<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Brokers 2026 投資指南 | 盈透證券專屬優惠</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=SF+Pro+Display:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Apple 官網設計語彙：極簡、大留白、現代排版 */
        :root {
            --apple-black: #1d1d1f;
            --apple-gray: #f5f5f7;
            --apple-dark-gray: #86868b;
            --ibkr-crimson: #bf0d3e; /* IBKR 官方識別紅 */
            --apple-blue: #0071e3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Noto Sans TC', sans-serif;
            background-color: #ffffff;
            color: var(--apple-black);
            letter-spacing: -0.01em;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Apple 風格極簡導覽列 */
        header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            z-index: 9999;
        }

        .nav-container {
            max-width: 1024px;
            margin: 0 auto;
            height: 52px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 22px;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--apple-black);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo span {
            color: var(--ibkr-crimson);
        }

        .nav-btn {
            background-color: var(--apple-black);
            color: #ffffff;
            font-size: 12px;
            font-weight: 400;
            padding: 4px 12px;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            opacity: 0.8;
        }

        /* 主橫幅區塊 (Hero Section) */
        .hero {
            text-align: center;
            padding: 100px 22px 60px 22px;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.07;
            margin-bottom: 18px;
        }

        .hero .subtitle {
            font-size: 24px;
            color: var(--apple-dark-gray);
            font-weight: 400;
            margin-bottom: 30px;
        }

        .hero .cta-link {
            font-size: 21px;
            color: var(--apple-blue);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 400;
        }

        .hero .cta-link:hover {
            text-decoration: underline;
        }

        /* 核心內文結構 */
        .section-container {
            max-width: 980px;
            margin: 0 auto;
            padding: 60px 22px;
        }

        .section-title {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 50px;
            text-align: center;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .info-card {
            background-color: var(--apple-gray);
            border-radius: 18px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 260px;
        }

        .info-card h3 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .info-card p {
            font-size: 16px;
            color: var(--apple-dark-gray);
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="#" class="logo">Interactive <span>Brokers</span></a>
            <a href="#" class="nav-btn">專屬優惠</a>
        </div>
    </header>

    <section class="hero">
        <h1>2026 全球投資首選</h1>
        <div class="subtitle">盈透證券投資指南與專屬優惠活動</div>
        <a href="#" class="cta-link">了解更多優惠詳情 <i class="fa-solid fa-chevron-right"></i></a>
    </section>

    <section class="section-container">
        <h2 class="section-title">為什麼選擇盈透證券？</h2>
        <div class="grid-layout">
            <div class="info-card">
                <div>
                    <h3>全球市場直達</h3>
                    <p>一個帳戶即可交易全球 150 多個市場的股票、期權、期貨、貨幣、債券及基金。</p>
                </div>
            </div>
            <div class="info-card">
                <div>
                    <h3>極低交易成本</h3>
                    <p>提供業界最具競爭力的佣金費率，以及極低的保證金貸款利率，讓您的投資效益最大化。</p>
                </div>
            </div>
            <div class="info-card">
                <div>
                    <h3>資產安全保障</h3>
                    <p>身為上市龍頭券商，資金受到嚴格監管，並提供高額的客戶資產保障計畫，讓您投資更安心。</p>
                </div>
            </div>
        </div>
    </section>

</body>
</html>

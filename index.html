<html lang="zh-TW">
  <head>
    <meta content="text/html; charset=UTF-8" http-equiv="content-type">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【限時特惠】送你 $300 乘車金！快搭 Uber 出發吧</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&amp;display=swap"

      rel="stylesheet">
    <style>
        /* 定義 Uber 品牌色系與變數 */
        :root {
            --uber-black: #000000;
            --uber-white: #ffffff;
            --uber-gray-dark: #333333;
            --uber-gray-light: #f6f6f6;
            --uber-gray-text: #545454;
            --line-green: #06C755;
            --ubereats-green: #06C755;
            --ubereats-black: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Noto Sans TC", sans-serif;
        }

  body {
      background-color: var(--uber-gray-light);
      color: var(--uber-black);
      display: flex;
      justify-content: center;
    
      /* 1. 把 center 改成 flex-start，讓卡片從頂部排下來，高度不夠時可以往下滾動 */
      align-items: flex-start; 
    
      min-height: 100vh;
    
      /* 2. 增加上方的內邊距（Padding），確保在任何手機上頂部都有安全留白 */
      padding: 40px 20px; 
  }

        /* 核心卡片容器 */
        .promo-container {
            background: var(--uber-white);
            max-width: 450px; /* 稍微縮小寬度增加精緻感 */
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.08);
            padding: 32px;
            text-align: center;
        }

       .brand-header {
        font-size: 26px;       /* 稍微放大，更有品牌感 */
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 8px;    /* 縮短與下方標籤的距離 */
        text-align: left;    /* 改為置中，與整體設計一致 */
      }

.promo-badge {
    display: inline-block;
    background-color: var(--uber-black);
    color: var(--uber-white);
    font-size: 13px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 24px;   /* 留點空間給下方的標題 */
    animation: pulse 2s infinite;
}

        .promo-title {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 16px;
        }

        /* 內文描述區 */
        .promo-text {
            font-size: 15px;
            color: var(--uber-gray-dark);
            line-height: 1.6;
            margin-bottom: 24px;
            text-align: left;
            background: #fafafa;
            padding: 16px;
            border-left: 4px solid var(--uber-black);
            border-radius: 0 6px 6px 0;
        }

        /* 主要 CTA 按鈕 */
        .cta-button {
            display: block;
            background-color: var(--uber-black);
            color: var(--uber-white);
            font-size: 17px;
            font-weight: 500;
            text-decoration: none;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .cta-button:hover { background-color: #1f1f1f; }

        /* 複製連結區塊 */
        .copy-box {
            display: flex;
            align-items: center;
            background: var(--uber-gray-light);
            border-radius: 8px;
            padding: 6px 12px;
            margin-bottom: 30px;
        }

        .url-input {
            flex: 1;
            font-size: 12px;
            color: var(--uber-gray-text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: left;
        }

        .copy-btn {
            background: var(--uber-white);
            border: 1px solid #ddd;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .share-label {
            font-size: 13px;
            color: #888;
            margin-bottom: 12px;
        }

        /* LINE 按鈕：全寬設計 */
        .share-line-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--line-green);
            color: white;
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }

        /* Uber Eats 按鈕：次要樣式（縮小尺寸） */
        .eats-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background-color: var(--ubereats-black);
            color: white;
            font-size: 14px; /* 縮小字體 */
            font-weight: 500;
            text-decoration: none;
            padding: 10px; /* 縮小 Padding */
            border-radius: 8px;
            transition: opacity 0.2s;
            opacity: 0.9;
          /* 💡 加入下面這行，讓它與上面的 LINE 按鈕保持距離 */
            margin-top: 24px;
        }

        .share-line-btn:hover, .eats-btn:hover { opacity: 0.8; }

        /* 呼吸燈動畫 */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,0,0,0.1); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 6px rgba(0,0,0,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,0,0,0); }
        }
    </style>
  </head>
  <body>
    <div class="promo-container">
      <div class="brand-header">Uber</div>
      <div class="promo-badge">限時好友推薦優惠</div>
      <h1 class="promo-title">送你首 2 趟行程<br>
        每趟折抵 $150 乘車金</h1>
      <div class="promo-text"> 嘿！快來體驗 Uber App
        叫車，並使用我的專屬推薦連結：https://referrals.uber.com/refer?id=<mark><b>czszdrvbbm59</b></mark>，
        即可享首 2 趟行程每趟折抵 $150 之乘車優惠。使用 Uber App 乘車，既實惠又便利，輕鬆前往目的地。 </div>
      <a href="https://referrals.uber.com/refer?id=czszdrvbbm59" target="_blank"

        class="cta-button"> 立即領取 $300 優惠 </a>
      <div class="copy-box"> <span class="url-input" id="promoUrl">https://referrals.uber.com/refer?id=czszdrvbbm59</span>
        <button class="copy-btn" onclick="copyLink()">複製連結</button> </div>
      <div class="share-label">分享給好友一起省錢</div>
      <a href="#" target="_blank" class="share-line-btn" id="lineShareBtn"> 透過
        LINE 轉寄好友 </a> <a href="https://uber-eat-promo-code.vercel.app/" target="_blank"

        class="eats-btn"> 立即領取 Uber Eats 優惠碼 </a> </div>
    <script>
        function copyLink() {
            const urlText = document.getElementById('promoUrl').innerText;
            navigator.clipboard.writeText(urlText).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.innerText = '已複製';
                setTimeout(() => { btn.innerText = '複製連結'; }, 2000);
            });
        }

        // LINE 轉寄邏輯
        window.onload = function() {
            const currentUrl = window.location.href;
            const link = document.getElementById('lineShareBtn');
            const targetUrl = (currentUrl.includes('http')) ? currentUrl : "https://referrals.uber.com/refer?id=czszdrvbbm59";
            link.href = "https://social-plugins.line.me/lineit/share?url=" + encodeURIComponent(targetUrl);
        };
    </script>
    
  </body>
</html>
